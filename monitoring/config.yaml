# ============================================
# ProjeXtPal Monitoring Configuration
# Monitors ProjeXtPal infrastructure only
# ============================================

global:
  check_interval: 30            # seconds between checks
  alert_cooldown: 300           # seconds between repeat alerts for same issue
  max_response_time: 2000       # ms — alert if exceeded
  log_level: INFO
  data_retention_days: 30       # keep detailed metrics for 30 days
  daily_summary_hour: 8         # send daily summary at 8:00 AM
  dashboard_port: 8555          # monitoring dashboard port

  email:
    enabled: false              # Disable until Gmail App Password is configured
    smtp_host: smtp.gmail.com
    smtp_port: 587
    use_tls: true
    username: ${MONITOR_EMAIL_USER}
    password: ${MONITOR_EMAIL_PASSWORD}
    from_address: monitoring@inclufy.com
    recipients:
      - team@inclufy.com

  system_thresholds:
    cpu_warning: 80             # percent
    cpu_critical: 95
    memory_warning: 85
    memory_critical: 95
    disk_warning: 80
    disk_critical: 95

  recovery:
    max_restart_attempts: 3     # max container restarts before escalating
    restart_cooldown: 60        # seconds between restart attempts
    auto_recovery_enabled: true

# ============================================
# Platform Applications
# ============================================

applications:

  # ──────────────────────────────────────────────
  # ProjeXtPal — Project Management Platform
  # ──────────────────────────────────────────────

  - name: ProjeXtPal API
    group: projextpal
    type: web
    url: http://localhost:8001
    health_endpoint: /health/
    max_response_time: 1500
    recovery: auto
    enabled: true
    containers:
      - name: projectpal-backend
        role: backend

  - name: ProjeXtPal Nginx
    group: projextpal
    type: web
    url: http://localhost:8090
    health_endpoint: /
    max_response_time: 1500
    recovery: auto
    enabled: true
    containers:
      - name: projectpal-proxy
        role: proxy
      - name: projectpal-frontend
        role: frontend

  - name: ProjeXtPal Database
    group: projextpal
    type: database
    recovery: notify
    enabled: true
    containers:
      - name: projectpal-postgres
        role: database
        health_command: pg_isready -U projextpal

  - name: ProjeXtPal Redis
    group: projextpal
    type: cache
    recovery: notify
    enabled: true
    containers:
      - name: projectpal-redis
        role: cache
        health_command: redis-cli -a redis_password_2024 ping
