# ============================================
# Inclufai Platform Monitoring Configuration
# Applicatie-overstijgend — monitort ALLE Inclufy apps
#
# De monitoring agent draait met network_mode: host,
# dus alle URLs gebruiken localhost + exposed ports.
# ============================================

global:
  check_interval: 30            # seconds between checks
  alert_cooldown: 300           # seconds between repeat alerts for same issue
  max_response_time: 2000       # ms — alert if exceeded
  log_level: INFO
  data_retention_days: 30       # keep detailed metrics for 30 days
  daily_summary_hour: 8         # send daily summary at 8:00 AM
  dashboard_port: 8555          # monitoring dashboard port

  email:
    enabled: false              # Disable until Gmail App Password is configured
    smtp_host: smtp.gmail.com
    smtp_port: 587
    use_tls: true
    username: ${MONITOR_EMAIL_USER}
    password: ${MONITOR_EMAIL_PASSWORD}
    from_address: monitoring@inclufy.com
    recipients:
      - team@inclufy.com

  system_thresholds:
    cpu_warning: 80             # percent
    cpu_critical: 95
    memory_warning: 85
    memory_critical: 95
    disk_warning: 80
    disk_critical: 95

  recovery:
    max_restart_attempts: 3     # max container restarts before escalating
    restart_cooldown: 60        # seconds between restart attempts
    auto_recovery_enabled: true

# ============================================
# Platform Applications
# ============================================

applications:

  # ──────────────────────────────────────────────
  # ProjeXtPal — Project Management Platform
  # Docker Stack: projextpal
  # Exposed: port 443/80 via nginx
  # ──────────────────────────────────────────────

  - name: ProjeXtPal
    group: projextpal
    type: web
    url: http://localhost
    health_endpoint: /health/
    max_response_time: 1500
    recovery: auto
    enabled: true
    containers:
      - name: projextpal-backend-prod
        role: backend
      - name: projextpal-frontend-prod
        role: frontend
      - name: projextpal-nginx-prod
        role: proxy
      - name: projextpal-postgres-prod
        role: database
        health_command: pg_isready -U projextpal
      - name: projextpal-redis-prod
        role: cache
        health_command: redis-cli ping

  # ──────────────────────────────────────────────
  # Inclufy Finance — AI-Powered Financial Platform
  # Docker Stack: inclufy-auto-fina
  # ──────────────────────────────────────────────

  - name: Inclufy Finance
    group: inclufy-auto-fina
    type: web
    url: http://localhost:8080
    health_endpoint: /health
    max_response_time: 2000
    recovery: notify
    enabled: true
    containers:
      - name: inclufyfinance-frontend
        role: frontend

  # ──────────────────────────────────────────────
  # Inclufy Marketing — AI Marketing Platform
  # Docker Stack: inclufymarketing
  # Proxy: marketing-proxy on port 8092
  # ──────────────────────────────────────────────

  - name: Inclufy Marketing
    group: inclufymarketing
    type: web
    url: http://localhost:8092
    health_endpoint: /health
    max_response_time: 2000
    recovery: notify
    enabled: true
    containers:
      - name: inclufymarketing-main-frontend-1
        role: frontend
      - name: inclufymarketing-main-backend-1
        role: backend
      - name: marketing-proxy
        role: proxy

  # ──────────────────────────────────────────────
  # IQ Helix — Leadership Intelligence Platform
  # Docker Stack: iqhelixdeployment
  # Proxy: iqhelix-proxy on port 8095
  # ──────────────────────────────────────────────

  - name: IQ Helix
    group: iqhelixdeployment
    type: web
    url: http://localhost:8095
    health_endpoint: /
    max_response_time: 3000
    recovery: notify
    enabled: true
    containers:
      - name: iqhelix-proxy
        role: proxy
