version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: inclufymarketing-main-frontend-1
    restart: unless-stopped
    networks:
      - marketing

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inclufymarketing-main-backend-1
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - marketing

  proxy:
    image: nginx:alpine
    container_name: marketing-proxy
    restart: unless-stopped
    ports:
      - "8092:8092"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - marketing

networks:
  marketing:
    driver: bridge
