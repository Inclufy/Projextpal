upstream frontend {
    server frontend:80;
}

upstream backend {
    server backend:8001;
}

## Preserve X-Forwarded-Proto from upstream (cloudflared sets 'https'),
## fall back to local $scheme if upstream didn't send it. This is what
## unblocks Django's SECURE_SSL_REDIRECT=True — without this map we'd
## hardcode http behind the Cloudflare tunnel and trigger the
## infinite-redirect loop.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

## Monitoring is verplaatst naar platform-niveau (poort 8555)
## Bereikbaar via http://<server>:8555

server {
    listen 80;
    server_name projextpal.com www.projextpal.com localhost;
    
    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    
    # AI Visual Generation - Extended timeout (must be before /api/)
    location /api/v1/academy/visuals/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Extended timeouts for AI generation (5 minutes)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Backend API
    # CORS is handled by Django's corsheaders middleware - do not add
    # CORS headers here to avoid duplicate headers that break browsers
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    
    # Admin
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Monitoring is verplaatst naar platform-niveau (poort 8555)

    # Health check endpoint
    location /health/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files
    location /static/ {
        alias /app/staticfiles/;
    }
    
    # Media files
    location /media/ {
        alias /app/media/;
    }
}

# Dedicated API host (api.projextpal.com) — proxies everything to the Django
# backend so the subdomain works as a clean API endpoint. The Cloudflare tunnel
# must route api.projextpal.com -> http://localhost:8090 (this nginx) for this
# server block to receive traffic.
server {
    listen 80;
    server_name api.projextpal.com;

    location /api/v1/academy/visuals/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /static/ {
        alias /app/staticfiles/;
    }
    location /media/ {
        alias /app/media/;
    }
}
