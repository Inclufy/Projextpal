upstream frontend {
    server frontend:80;
}

upstream backend {
    server backend:8001;
}

## Resolve the scheme Django sees. ALL public traffic reaches this nginx via
## the Cloudflare tunnel and is therefore https at the edge. cloudflared does
## not reliably forward X-Forwarded-Proto, so a $scheme fallback (= http inside
## the tunnel) makes Django's SECURE_SSL_REDIRECT=True 301 forever -> infinite
## redirect loop. Force https for everything except a literal "http" (which
## Cloudflare never sends for an https site): absent/"https" -> https.
map $http_x_forwarded_proto $forwarded_proto {
    default  https;
    "http"   http;
}

## Monitoring is verplaatst naar platform-niveau (poort 8555)
## Bereikbaar via http://<server>:8555

server {
    listen 80;
    server_name projextpal.com www.projextpal.com localhost;
    
    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    
    # AI Visual Generation - Extended timeout (must be before /api/)
    location /api/v1/academy/visuals/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Extended timeouts for AI generation (5 minutes)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Backend API
    # CORS is handled by Django's corsheaders middleware - do not add
    # CORS headers here to avoid duplicate headers that break browsers
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    
    # Django's own admin site — moved off /admin/ so the React admin portal
    # owns /admin/* (those fall through to "location /" → the SPA, which serves
    # index.html for client-side routes). Without this, a refresh/deep-link to
    # /admin/subscriptions hit Django and returned a Django 404.
    location /django-admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Monitoring is verplaatst naar platform-niveau (poort 8555)

    # Health check endpoint
    location /health/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Static files
    location /static/ {
        alias /app/staticfiles/;
    }
    
    # Media files
    location /media/ {
        alias /app/media/;
    }
}

# Dedicated API host (api.projextpal.com) — proxies everything to the Django
# backend so the subdomain works as a clean API endpoint. The Cloudflare tunnel
# must route api.projextpal.com -> http://localhost:8090 (this nginx) for this
# server block to receive traffic.
server {
    listen 80;
    server_name api.projextpal.com;

    location /api/v1/academy/visuals/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /static/ {
        alias /app/staticfiles/;
    }
    location /media/ {
        alias /app/media/;
    }
}
