# ============================================
# Inclufai Platform Monitoring
# Applicatie-overstijgend — monitort ALLE Inclufy apps
#
# Usage:
#   docker compose -f docker-compose.monitoring.yml up -d
#
# Dit draait APART van alle applicatie stacks.
# Gebruikt network_mode: host om alle apps te bereiken
# via hun exposed ports, zonder te koppelen aan
# individuele app-netwerken.
# ============================================

services:
  monitoring:
    build: ./monitoring
    container_name: inclufai-monitoring
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - monitoring_data:/app/data
    environment:
      - MONITOR_EMAIL_USER=${MONITOR_EMAIL_USER}
      - MONITOR_EMAIL_PASSWORD=${MONITOR_EMAIL_PASSWORD}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # Uses CMD from Dockerfile: python -m monitoring.agent --daemon

volumes:
  monitoring_data:
