  - id: PLAN-05
    category: project_plan
    title: Push-back rule enforced (1 push, max 14 days, then approval)
    source: Project Plan docx — "Due dates can only be pushed back once for a maximum period of 2 weeks. More than this should be discussed with and approved by project owner."
    priority: must
    sprint_added: 1
    checks:
      - type: model_field
        model: projects.Task
        field: revision_count
      - type: model_field
        model: projects.TaskDueDateChangeRequest
        field: status
      - type: endpoint_exists
        method: GET
        path: /api/v1/projects/task-due-change-requests/
        expected_status: [200, 401, 403]
      - type: migration_applied
        app: projects
        migration: 0015_pushback_workflow

  - id: PLAN-06
    category: project_plan
    title: RAID — Risks / Assumptions / Issues / Dependencies
    source: Project Plan docx — Risks and Issues section + governance best practice
    priority: must
    sprint_added: pre-existing
    checks:
      - type: model_field
        model: projects.Risk
        field: probability
      - type: model_field
        model: projects.Assumption
        field: validation_status
      - type: model_field
        model: projects.Issue
        field: status

  - id: PLAN-07
    category: project_plan
    title: Project closing — Senior Manager sign-off with signature
    source: Project Plan docx — "Senior manager should sign off every project to be considered as a 'finished project'"
    priority: must
    sprint_added: 2
    checks:
      - type: model_field
        model: projects.ProjectSignOff
        field: signed_off_by
      - type: model_field
        model: projects.ProjectSignOff
        field: signature_image
      - type: endpoint_exists
        method: GET
        path: /api/v1/projects/2/closing/sign-off/
        expected_status: [200, 401, 403, 404]
      - type: frontend_component
        path: frontend/src/components/ProjectSignOffDialog.tsx

  - id: PLAN-08
    category: project_plan
    title: Communication plan data model (kickoff/onboarding/regular/closing)
    source: Project Plan docx — Communication plan section
    priority: should
    sprint_added: 3
    checks:
      - type: model_field
        model: projects.CommunicationPlan
        field: project
      - type: model_field
        model: projects.PlanEvent
        field: event_type
      - type: migration_applied
        app: projects
        migration: 0019_communicationplan

  - id: PLAN-09
    category: project_plan
    title: Project Plan DOCX export matches Yanmar template
    source: Project Plan docx itself — must be regeneratable from data
    priority: must
    sprint_added: 1
    checks:
