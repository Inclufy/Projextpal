requirements:

  # ============================================================
  # CATEGORY: Action Tracker (PRJ LEGO xlsx)
  # ============================================================
  - id: ATR-01
    category: action_tracker
    title: Task category column with sub-totals
    source: Action Tracker xlsx — CATEGORY column + COUNTIFS sub-totals
    priority: must
    sprint_added: 1
    checks:
      - type: model_field
        model: projects.Task
        field: category
        file: backend/projects/models.py
      - type: endpoint_exists
        method: GET
        path: /api/v1/projects/tasks/category-subtotals/
        expected_status: [200, 401, 403]

  - id: ATR-02
    category: action_tracker
    title: RACI per task (R/A/C/I as separate fields)
    source: Action Tracker xlsx — R/A/C/I columns
    priority: must
    sprint_added: pre-existing
    checks:
      - type: model_field
        model: projects.Task
        field: raci_responsible
      - type: model_field
        model: projects.Task
        field: raci_accountable
      - type: model_field
        model: projects.Task
        field: raci_consulted
      - type: model_field
        model: projects.Task
        field: raci_informed

  - id: ATR-03
    category: action_tracker
    title: Revised Due Date + Completed On + Delay tracking
    source: Action Tracker xlsx — REVISED DUE DATE / COMPLETED ON / PROJECT DELAY columns
    priority: must
    sprint_added: 0
    checks:
      - type: model_field
        model: projects.Task
        field: revised_due_date
      - type: model_field
        model: projects.Task
        field: completed_on
      - type: migration_applied
        app: projects
        migration: 0013_yanmar_schema_batch

  - id: ATR-04
    category: action_tracker
    title: 5-state progress indicator (Pending / 25 / 50 / 75 / Done)
    source: Action Tracker xlsx — PROGRESS column with unicode circles
    priority: should
    sprint_added: 0
    checks:
      - type: file_exists
        path: backend/projects/serializers.py
      - type: manual
        instruction: |
          Verify that TaskSerializer exposes a `progress_bucket` field that
          maps `progress` int (0..100) to one of:
          pending | quarter | half | three_quarter | done

  - id: ATR-05
    category: action_tracker
    title: Today / Tomorrow / This Week / Next Week KPI tiles
    source: Action Tracker xlsx — COUNTIFS counters at top
    priority: must
    sprint_added: 1
    checks:
      - type: endpoint_exists
        method: GET
        path: /api/v1/projects/2/task-kpi/
        expected_status: [200, 401, 403]
      - type: frontend_component
        path: frontend/src/components/TaskKpiTiles.tsx

