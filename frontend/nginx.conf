server {
    listen 80;
    server_name _;
    
    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;
    
    # API proxy naar backend
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Hardcode https — Cloudflare always terminates TLS at the edge and
        # forwards plain HTTP to this nginx, so $scheme is always 'http' here.
        # We need Django (SECURE_SSL_REDIRECT + SECURE_PROXY_SSL_HEADER) to see
        # 'https' so it doesn't 301-loop. If we ever bypass Cloudflare or expose
        # this directly via HTTPS, revisit.
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
    
    # Frontend routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
