# SPA nginx config for the projextpal-frontend-prod container.
#
# Two cache rules — the canonical SPA strategy:
#
#   /assets/*  (Vite-hashed bundles, e.g. index-D4pJwPyq.js)
#       -> Cache-Control: public, max-age=31536000, immutable
#       Files are content-addressed; the hash IS the version. Safe to
#       cache forever in browsers + intermediaries.
#       try_files $uri =404 — do NOT fall back to index.html for a
#       missing asset. Returning HTML with the wrong MIME type for what
#       the browser thinks is a JS module is the BUG-034 symptom that
#       broke production after the PR #23 deploy: previously-cached
#       browser tabs requested a stale bundle hash, nginx fell back to
#       index.html, and the browser blocked the page with
#       "Expected JavaScript-or-Wasm module script but the server
#        responded with a MIME type of text/html".
#       A clean 404 surfaces the problem instead of disguising it.
#
#   /index.html (and SPA-route fallbacks)
#       -> Cache-Control: no-cache
#       Allows browser caching but forces revalidation on every load.
#       The server can still respond 304 Not Modified if nothing changed,
#       so this is efficient — just no risk of a stale HTML hanging
#       around across a redeploy.
#
# Without these headers, browsers heuristically cache index.html based
# on Last-Modified (~10% of resource age), which is what created the
# stale-tab-after-redeploy failure mode on 2026-05-18.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed bundle files — immutable, cache forever.
    location ~* ^/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Health check (matches what the existing frontend/nginx.conf exposes).
    location = /health {
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # Everything else — HTML + SPA-route fallbacks. Never cache without
    # revalidating so newly-deployed bundle hashes are picked up
    # immediately by any open tab.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
