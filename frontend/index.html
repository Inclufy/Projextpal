    <!-- Google Analytics 4 (Consent Mode v2 — analytics pas ná cookie-toestemming, AVG-conform) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NKN8VD4B0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
      });
      // Eerder gegeven toestemming herstellen (projextpal.cookie.consent met analytics:true)
      try {
        var c = JSON.parse(localStorage.getItem('projextpal.cookie.consent') || 'null');
        if (c && c.analytics) gtag('consent', 'update', { analytics_storage: 'granted' });
      } catch (e) { /* localStorage geblokkeerd */ }
      gtag('config', 'G-2NKN8VD4B0', { anonymize_ip: true });
    </script>
