{% extends "email/base.html" %}
{% block content %}
  <h1>{{ i18n.title }}</h1>
  <p>{{ i18n.greeting }}</p>
  <p>{{ i18n.body }}</p>

  <div class="btn-wrap">
    <a href="{{ url }}" class="btn">{{ i18n.cta }}</a>
  </div>

  <p style="margin-top:8px;font-size:14px;color:#6b5b8a;">{{ i18n.fallback_intro }}</p>
  <div class="btn-fallback">{{ url }}</div>

  <div class="info-card">
    {{ i18n.info }}<br>
    <span style="display:inline-block;margin-top:6px;color:#6b5b8a;">
      {{ expires_text }}
    </span>
  </div>
{% endblock %}
