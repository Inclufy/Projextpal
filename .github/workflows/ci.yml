name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e-api:
    # Backend save-test suite — spins up Django + Postgres + Redis and runs
    # the four E2E scripts (project / program / academy / admin) against a
    # fresh DB. Catches the class of bug where a save endpoint starts
    # returning 400/500 (e.g. PRINCE2 Stage Plan, Agile DoD, LSS-Green
    # phase) before it ships. Parallel with test-mobile / test-web (no
    # `needs:`), so a UI failure doesn't mask an API failure and vice versa.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Django settings — keep DEBUG=False to match production-like config.
      # SECRET_KEY is >=50 chars + >=5 unique chars (enforced by core/settings.py
      # when DEBUG=False).
      SECRET_KEY: ci-secret-key-for-projextpal-please-rotate-me-aaaaaaaaaaaa
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      # settings.py reads POSTGRES_* / REDIS_* individually (not DATABASE_URL).
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      # SSL redirect would break HTTP testing in CI; opt out explicitly
      # (settings.py defaults this to True when DEBUG=False).
      SECURE_SSL_REDIRECT: "False"
      # Email / Stripe / OpenAI vars are required by settings.py at startup
      # (no decouple defaults). Dummy values are fine — none are exercised
      # by the save-test suite.
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      EMAIL_HOST: localhost
      EMAIL_PORT: "25"
      EMAIL_HOST_USER: ci@example.com
      EMAIL_HOST_PASSWORD: ci-password
      DEFAULT_FROM_EMAIL: ci@example.com
      FRONTEND_URL: http://localhost:5173
      BASE_URL: http://localhost:8001
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_PUBLIC_KEY: pk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_test_ci
      OPENAI_API_KEY: sk-ci-not-a-real-key
      # E2E client config — common.py reads these.
      BASE_URL_E2E: http://localhost:8001
      ADMIN_EMAIL: sami@inclufy.com
      ADMIN_PASSWORD: e2e-ci-2026
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Create CI superuser + tenant company
        working-directory: backend
        # The E2E scripts log in as ADMIN_EMAIL / ADMIN_PASSWORD. The
        # ProjectViewSet auto-scopes to the user's company FK, so the
        # superuser must be attached to a Company (multi-tenant gate in
        # perform_create() raises ValidationError otherwise).
        run: |
          python manage.py shell <<'PYEOF'
          from django.contrib.auth import get_user_model
          from accounts.models import Company

          User = get_user_model()
          company, _ = Company.objects.get_or_create(
              name='CI Tenant',
              defaults={'industry': 'software'},
          )
          user, created = User.objects.get_or_create(
              email='sami@inclufy.com',
              defaults={
                  'username': 'sami',
                  'is_staff': True,
                  'is_superuser': True,
                  'is_active': True,
                  'role': 'superadmin',
                  'company': company,
              },
          )
          user.is_staff = True
          user.is_superuser = True
          user.is_active = True
          user.company = company
          user.set_password('e2e-ci-2026')
          user.save()
          print(f"superuser sami@inclufy.com {'created' if created else 'updated'} (company={company.id})")
          PYEOF

      - name: Start backend (runserver, background)
        working-directory: backend
        # runserver is lighter than gunicorn and is enough for a save-test
        # suite — we're hitting REST endpoints, not load-testing.
        run: |
          nohup python manage.py runserver 0.0.0.0:8001 --insecure > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for /api/v1/health/
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/api/v1/health/simple/ >/dev/null 2>&1; then
              echo "backend healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::backend never became healthy"
          echo "----- backend.log -----"
          cat /tmp/backend.log || true
          exit 1

      - name: Run project_manager_full.py
        env:
          BASE_URL: http://localhost:8001
        run: python tests/e2e/project_manager_full.py

      - name: Run program_manager_full.py
        env:
          BASE_URL: http://localhost:8001
        run: python tests/e2e/program_manager_full.py

      - name: Run academy_full.py
        env:
          BASE_URL: http://localhost:8001
        run: python tests/e2e/academy_full.py

      - name: Run admin_portal_full.py
        env:
          BASE_URL: http://localhost:8001
        run: python tests/e2e/admin_portal_full.py

      - name: Dump backend log on failure
        if: failure()
        run: |
          echo "----- backend.log -----"
          cat /tmp/backend.log || true

  test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test -- --ci

  build:
    runs-on: ubuntu-latest
    needs: [test-mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx expo export --platform ios

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run

  build-web:
    runs-on: ubuntu-latest
    needs: [test-web]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Bundle size guard
        run: |
          # Cap combined size of all index-*.js entry chunks (excludes lazy
          # page chunks + vendor chunks). Post code-split baseline: ~1.5 MB.
          # Cap at 2 MB to catch regressions without blocking small growth.
          # If lazy() unwinds, the main chunk balloons back to 5 MB and trips this.
          TOTAL=0
          for f in dist/assets/index-*.js; do
            [ -f "$f" ] || continue
            S=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null)
            TOTAL=$((TOTAL + S))
            echo "  $f: $S bytes"
          done
          echo "Combined index-*.js: $TOTAL bytes"
          if [ "$TOTAL" -gt 2000000 ]; then
            echo "::error::Combined index-*.js ${TOTAL} bytes exceeds 2 MB regression cap. Did lazy() routing unwind?"
            exit 1
          fi

  docker-web:
    # Build + push container to GitHub Container Registry on main pushes only.
    # Backstops manual ssh-and-docker-build deploy flow with reproducible
    # provenance (image digest in registry).
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    # Serialize docker-web runs per ref and cancel any in-progress run when
    # a newer commit lands on the same branch. Two near-simultaneous master
    # merges (PR #24 + #25 on 2026-05-18) each pushed their own image to
    # `:latest`; the second-to-finish overwrote the actual-newer one and
    # left `:latest` pointing at a stale image that lacked the BUG-034
    # nginx fix. With `cancel-in-progress: true` the older run is killed
    # the instant the newer push lands, so only one image — the newest
    # commit's — ever wins the `:latest` race.
    concurrency:
      group: docker-web-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: |
          echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_APP_VERSION=${{ github.sha }}
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}-web:${{ github.sha }}
            ghcr.io/${{ steps.image.outputs.name }}-web:latest
