name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test -- --ci

  build:
    runs-on: ubuntu-latest
    needs: [test-mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx expo export --platform ios

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run

  build-web:
    runs-on: ubuntu-latest
    needs: [test-web]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Bundle size guard
        run: |
          # Cap combined size of all index-*.js entry chunks (excludes lazy
          # page chunks + vendor chunks). Post code-split baseline: ~1.5 MB.
          # Cap at 2 MB to catch regressions without blocking small growth.
          # If lazy() unwinds, the main chunk balloons back to 5 MB and trips this.
          TOTAL=0
          for f in dist/assets/index-*.js; do
            [ -f "$f" ] || continue
            S=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null)
            TOTAL=$((TOTAL + S))
            echo "  $f: $S bytes"
          done
          echo "Combined index-*.js: $TOTAL bytes"
          if [ "$TOTAL" -gt 2000000 ]; then
            echo "::error::Combined index-*.js ${TOTAL} bytes exceeds 2 MB regression cap. Did lazy() routing unwind?"
            exit 1
          fi

  docker-web:
    # Build + push container to GitHub Container Registry on main pushes only.
    # Backstops manual ssh-and-docker-build deploy flow with reproducible
    # provenance (image digest in registry).
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: |
          echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}-web:${{ github.sha }}
            ghcr.io/${{ steps.image.outputs.name }}-web:latest
